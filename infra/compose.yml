services:
  postgres_dev:
    image: postgres:18.1-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_DB: project_dev
      POSTGRES_USER: project_dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '[ -n "$${POSTGRES_USER}" ] && [ -n "$${POSTGRES_DB}" ] && [ -n "$${POSTGRES_PASSWORD}" ] && PGPASSWORD="$${POSTGRES_PASSWORD}" psql -h 127.0.0.1 -p 5432 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -tAc "SELECT 1" | grep -qx 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
