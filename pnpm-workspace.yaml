packages:
  - apps/*
  - packages/*
allowBuilds:
  "@nestjs/core": true
  "@scarf/scarf": true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  sharp: true

catalog:
  "@types/node": "25.6.0"
  "@types/react": "19.2.14"
  "@types/react-dom": "19.2.3"
  tsdown: "0.21.10"
  turbo: "2.9.7"
  typescript: "6.0.3"
  vite: "8.0.10"
  vitest: "4.1.5"

minimumReleaseAgeExclude:
  - react
  - react-dom
  - typescript
  - vite
  - "@vitejs/*"
  - turbo
  - "@turbo/*"
  - drizzle-orm
  - drizzle-kit
